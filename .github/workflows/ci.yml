name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke (syntax + import)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (all .py under tracked dirs)
        run: |
          set -euo pipefail
          # py_compile every .py file tracked by git, except venv/ and tests/__pycache__/
          git ls-files '*.py' \
            | grep -vE '^(venv|\.venv)/' \
            | xargs python -m py_compile

      - name: Import smoke test
        run: |
          # bot.py needs TELEGRAM_BOT_TOKEN at import time → stub via env
          set -a
          : "${TELEGRAM_BOT_TOKEN:=ci-dummy-token}"
          : "${OPENAI_BASE_URL:=http://127.0.0.1:8003/v1}"
          export TELEGRAM_BOT_TOKEN OPENAI_BASE_URL
          set +a

          # ollama_openai_proxy.py has no side effects on import → just import it
          python -c "
          import importlib.util, sys
          for mod in ['bridge.st_bridge', 'scripts.ollama_openai_proxy', 'telegram-bot.bot']:
              spec = importlib.util.spec_from_file_location(
                  mod.replace('.', '/'),
                  mod.replace('.', '/') + '.py',
              )
              mod_obj = importlib.util.module_from_spec(spec)
              try:
                  spec.loader.exec_module(mod_obj)
              except SystemExit:
                  pass  # bot.py may call sys.exit if deps missing
              except Exception as e:
                  # bot.py imports python_telegram_bot etc; skip its own deps
                  if 'bot' in mod and ('telegram' in str(e) or 'aiohttp' in str(e) or 'httpx' in str(e)):
                      print(f'[skip {mod}] {e}')
                  else:
                      raise
              print(f'OK: {mod}')
          "

      - name: Validate JSON config files
        run: |
          set -euo pipefail
          # All tracked JSON files must parse. Guard every pipeline stage
          # with `|| true` so empty outputs don't trip pipefail.
          json_files=$(git ls-files '*.json' 2>/dev/null | { grep -vE '^(venv|\.venv|node_modules)/' || true; } | { grep -v '^$' || true; })
          if [ -z "$json_files" ]; then
            echo "No tracked JSON files to validate"
            exit 0
          fi
          count=0
          for f in $json_files; do
            python -c "import json; json.load(open('$f'))" && echo "OK: $f"
            count=$((count + 1))
          done
          echo "Validated $count JSON files"

      - name: Validate YAML files
        run: |
          set -euo pipefail
          # Quick sanity check on YAML files (none expected in this repo, but
          # harmless if present). Use the same `|| true` guard for empty case.
          files=$(git ls-files '*.yml' '*.yaml' 2>/dev/null | { grep -v '^$' || true; })
          if [ -n "$files" ]; then
            pip install pyyaml >/dev/null 2>&1 || true
            for f in $files; do
              python -c "import sys, yaml; yaml.safe_load(open('$f'))" && echo "OK: $f"
            done
          else
            echo "No YAML files to validate"
          fi

  lint:
    name: Lint (ruff, best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true  # don't block on lint — repo isn't strict yet

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          ruff check --select=E9,F63,F7,F82 --output-format=github telegram-bot bridge scripts tests || true
